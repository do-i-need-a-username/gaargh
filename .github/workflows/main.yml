name: Ruby

on:
  push:
    branches:
      - master

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: ruby build

    steps:
    - uses: actions/checkout@v4
    - name: Extract Ruby version from gemspec
      id: ruby-version
      run: |
        VERSION=$(grep 'spec.required_ruby_version' gaargh.gemspec | grep -oP '(?<=>= )[\d.]+' | head -1)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ steps.ruby-version.outputs.version }}
        bundler-cache: true
    - name: Run the default task
      run: bundle exec rake
